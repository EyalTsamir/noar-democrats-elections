<!doctype html>
<!--
  ============================================================
  מקור העיצוב של תמונת השיתוף (public/share.jpg, 1200×630)
  ============================================================
  זו התמונה שמופיעה כששולחים את קישור האתר בוואטסאפ / פייסבוק.
  היא לא נבנית אוטומטית — אחרי עריכה כאן צריך לרנדר מחדש:

  1. פותחים את הקובץ הזה בדפדפן בחלון ברוחב 1200×630,
     או מריצים צילום מסך בכרום ללא־ראש (headless):

       chrome --headless --screenshot=share.png --window-size=1200,630 \
         --hide-scrollbars "file:///.../tools/share-image.html"

  2. ממירים ל-JPEG (איכות ~88) ושומרים בתור public/share.jpg
  3. חשוב לשמור על יחס 1200×630 — זה היחס שוואטסאפ חותך אליו,
     ועל משקל קובץ מתחת ל-300KB (וואטסאפ מתעלם מתמונות כבדות)

  הגופנים נטענים מ-node_modules (יחסית לתיקיית tools),
  והלוגו מ-src/assets — לכן חייבים לפתוח את הקובץ מתוך הריפו.
-->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>תמונת שיתוף — בחירות בנוער הדמוקרטים 2026</title>
<style>
  @font-face {
    font-family: 'Secular One';
    src: url('../node_modules/@fontsource/secular-one/files/secular-one-hebrew-400-normal.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Heebo Variable';
    src: url('../node_modules/@fontsource-variable/heebo/files/heebo-hebrew-wght-normal.woff2') format('woff2-variations');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }

  /* הצבעים והשפה הגרפית — לפי src/styles/tokens.css ("מהרחוב לכנסת") */
  .poster {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #0b1040;
    font-family: 'Heebo Variable', sans-serif;
    color: #ffffff;
    overflow: hidden;
  }

  /* טקסטורת רעש עדינה — כמו על משטחי הדיו באתר */
  .poster::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.38'/></svg>");
    opacity: 0.07;
    pointer-events: none;
  }

  /* הילה כחולה עדינה מאחורי הכותרת */
  .glow {
    position: absolute;
    inset-inline-end: -180px;
    inset-block-start: -220px;
    width: 720px;
    height: 720px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(38, 53, 219, 0.55), transparent 65%);
  }

  /* פס אדום אלכסוני בתחתית — חתימת הפוסטר */
  .stripe {
    position: absolute;
    inset-inline-start: -60px;
    inset-block-end: 74px;
    width: 1340px;
    height: 108px;
    background: #e02334;
    transform: rotate(-1.5deg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.45);
  }
  .stripe span {
    font-family: 'Secular One', sans-serif;
    font-size: 44px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .stripe .dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.85);
    flex: none;
  }

  .content {
    position: absolute;
    z-index: 2;
    inset-block-start: 72px;
    inset-inline-start: 84px;
    inset-inline-end: 84px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 48px;
  }

  .kicker {
    display: inline-block;
    font-weight: 700;
    font-size: 30px;
    color: #a9b2e6;
    letter-spacing: 0.04em;
    margin-block-end: 18px;
  }

  h1 {
    font-family: 'Secular One', sans-serif;
    font-weight: 400;
    font-size: 100px;
    line-height: 1.08;
  }
  h1 .em { color: #ffd166; }

  .date-sticker {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    margin-block-start: 34px;
    background: #ffffff;
    color: #0b1040;
    padding: 10px 28px;
    transform: rotate(1.2deg);
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.45);
  }
  .date-sticker .num {
    font-family: 'Secular One', sans-serif;
    font-size: 46px;
  }
  .date-sticker .label {
    font-weight: 700;
    font-size: 26px;
    color: #b3121f;
  }

  /* הלוגו — "מודבק" כמו תמונה על פוסטר, מסגרת לבנה והטיה קלה */
  .logo-frame {
    flex: none;
    background: #ffffff;
    padding: 14px 14px 40px;
    transform: rotate(2.5deg);
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.55);
  }
  .logo-frame img {
    display: block;
    width: 264px;
    height: 264px;
    object-fit: cover;
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="glow"></div>

    <div class="content">
      <div>
        <span class="kicker">מהרחוב לכנסת · נוער הדמוקרטים</span>
        <h1>בחירות <span class="em">2026</span><br />זה הקול שלנו.</h1>
        <div class="date-sticker">
          <span class="label">יום הבחירות</span>
          <span class="num">22.7.2026</span>
        </div>
      </div>
      <div class="logo-frame">
        <img src="../src/assets/logo-noar.jpg" alt="" />
      </div>
    </div>

    <div class="stripe">
      <span>המועמדים</span>
      <span class="dot"></span>
      <span>העימות</span>
      <span class="dot"></span>
      <span>איך מצביעים</span>
      <span class="dot"></span>
      <span>ועדת הבחירות</span>
    </div>
  </div>
</body>
</html>
