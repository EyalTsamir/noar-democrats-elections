<!doctype html>
<!--
  ============================================================
  מקור העיצוב של תמונת השיתוף המרובעת (public/share-square.jpg, 1080×1080)
  ============================================================
  זו התמונה של תגית og:image — מה שוואטסאפ ופייסבוק מציגים בשיתוף קישור.
  וואטסאפ חותך את התמונה לריבוע במרכז, ולכן התמונה מרובעת מלכתחילה —
  כך שום דבר לא נחתך, בכל סגנון תצוגה (מוקטן או מלא).
  (הבאנר הרחב tools/share-image.html משמש את twitter:image בלבד.)

  היא לא נבנית אוטומטית — אחרי עריכה כאן צריך לרנדר מחדש:

  1. צילום מסך בכרום ללא־ראש (headless), מתוך תיקיית הריפו:

       chrome --headless --screenshot=share-square.png --window-size=1080,1080 \
         --hide-scrollbars "file:///.../tools/share-image-square.html"

  2. ממירים ל-JPEG (איכות ~88) ושומרים בתור public/share-square.jpg
  3. חשוב: לשמור על 1080×1080 ועל משקל מתחת ל-300KB
     (וואטסאפ מוותר בשקט על תמונות כבדות יותר)

  הגופנים נטענים מ-node_modules והלוגו מ-src/assets —
  לכן חייבים לפתוח את הקובץ מתוך הריפו.
-->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>תמונת שיתוף מרובעת — בחירות בנוער הדמוקרטים 2026</title>
<style>
  @font-face {
    font-family: 'Secular One';
    src: url('../node_modules/@fontsource/secular-one/files/secular-one-hebrew-400-normal.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Heebo Variable';
    src: url('../node_modules/@fontsource-variable/heebo/files/heebo-hebrew-wght-normal.woff2') format('woff2-variations');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }

  /* הצבעים והשפה הגרפית — לפי src/styles/tokens.css ("מהרחוב לכנסת") */
  .poster {
    position: relative;
    width: 1080px;
    height: 1080px;
    background: #0b1040;
    font-family: 'Heebo Variable', sans-serif;
    color: #ffffff;
    overflow: hidden;
    text-align: center;
  }

  /* טקסטורת רעש עדינה — כמו על משטחי הדיו באתר */
  .poster::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.38'/></svg>");
    opacity: 0.07;
    pointer-events: none;
  }

  /* הילה כחולה עדינה מאחורי הכותרת */
  .glow {
    position: absolute;
    inset-inline-start: 180px;
    inset-block-start: 60px;
    width: 720px;
    height: 720px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(38, 53, 219, 0.5), transparent 65%);
  }

  .content {
    position: absolute;
    z-index: 2;
    inset-block-start: 56px;
    inset-inline: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .kicker {
    font-weight: 700;
    font-size: 34px;
    color: #a9b2e6;
    letter-spacing: 0.04em;
  }

  /* הלוגו — "מודבק" כמו תמונה על פוסטר, מסגרת לבנה והטיה קלה */
  .logo-frame {
    margin-block-start: 30px;
    background: #ffffff;
    padding: 12px 12px 34px;
    transform: rotate(-2.5deg);
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.55);
  }
  .logo-frame img {
    display: block;
    width: 210px;
    height: 210px;
    object-fit: cover;
  }

  h1 {
    margin-block-start: 34px;
    font-family: 'Secular One', sans-serif;
    font-weight: 400;
    font-size: 118px;
    line-height: 1.12;
  }
  h1 .em { color: #ffd166; }

  .date-sticker {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    margin-block-start: 38px;
    background: #ffffff;
    color: #0b1040;
    padding: 12px 34px;
    transform: rotate(1.2deg);
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.45);
  }
  .date-sticker .num {
    font-family: 'Secular One', sans-serif;
    font-size: 52px;
  }
  .date-sticker .label {
    font-weight: 700;
    font-size: 30px;
    color: #b3121f;
  }

  /* פס אדום אלכסוני בתחתית — חתימת הפוסטר */
  .stripe {
    position: absolute;
    inset-inline-start: -60px;
    inset-block-end: 88px;
    width: 1220px;
    height: 104px;
    background: #e02334;
    transform: rotate(-1.5deg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 34px;
    box-shadow: 0 14px 36px rgba(3, 5, 24, 0.45);
  }
  .stripe span {
    font-family: 'Secular One', sans-serif;
    font-size: 42px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .stripe .dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.85);
    flex: none;
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="glow"></div>

    <div class="content">
      <span class="kicker">מהרחוב לכנסת · נוער הדמוקרטים</span>
      <div class="logo-frame">
        <img src="../src/assets/logo-noar.jpg" alt="" />
      </div>
      <h1>בחירות <span class="em">2026</span><br />זה הקול שלנו.</h1>
      <div class="date-sticker">
        <span class="label">יום הבחירות</span>
        <span class="num">22.7.2026</span>
      </div>
    </div>

    <div class="stripe">
      <span>המועמדים</span>
      <span class="dot"></span>
      <span>העימות</span>
      <span class="dot"></span>
      <span>איך מצביעים</span>
    </div>
  </div>
</body>
</html>
